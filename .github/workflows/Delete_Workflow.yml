name: Delete Old Workflow Runs

on:
  workflow_dispatch:  # 手动触发工作流
  schedule:
    # 定时触发，UTC时间凌晨2:00执行（北京时间上午10:00）
    - cron: '0 2 * * *'

jobs:
  delete-old-runs:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取所有工作流运行记录
          echo "Fetching workflow runs..."
          
          # 获取运行列表（获取最近100条）
          runs=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100&page=1")
          
          # 检查API响应
          if [ -z "$runs" ]; then
            echo "No workflow runs found or API error"
            exit 0
          fi
          
          # 提取运行ID和创建时间，按创建时间排序（最旧的在前面）
          run_data=$(echo "$runs" | jq -r '.workflow_runs[] | "\(.id) \(.created_at)"' | sort -k2)
          
          # 计算总运行数
          total_runs=$(echo "$run_data" | wc -l)
          keep_runs=7
          
          echo "Total runs found: $total_runs"
          
          if [ $total_runs -le $keep_runs ]; then
            echo "Only $total_runs runs found, no need to delete (keeping $keep_runs)"
            exit 0
          fi
          
          # 计算需要删除的数量
          delete_count=$((total_runs - keep_runs))
          echo "Will delete $delete_count runs (keeping latest $keep_runs)"
          
          # 获取需要删除的运行ID（只取前N条最旧的）
          delete_ids=$(echo "$run_data" | head -n $delete_count | awk '{print $1}')
          
          # 如果没有需要删除的，退出
          if [ -z "$delete_ids" ]; then
            echo "No runs to delete"
            exit 0
          fi
          
          # 删除旧运行
          deleted_count=0
          failed_count=0
          
          for run_id in $delete_ids; do
            echo "Deleting workflow run ID: $run_id"
            response=$(curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              -w "%{http_code}" \
              -o /dev/null \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id")
            
            if [ "$response" = "204" ]; then
              echo "✓ Successfully deleted run $run_id"
              ((deleted_count++))
            else
              echo "✗ Failed to delete run $run_id (HTTP $response)"
              ((failed_count++))
            fi
            
            # 添加小延迟避免API限流
            sleep 0.5
          done
          
          echo "----------------------------------------"
          echo "Cleanup Summary:"
          echo "  Total runs found: $total_runs"
          echo "  Runs kept: $keep_runs"
          echo "  Successfully deleted: $deleted_count"
          echo "  Failed to delete: $failed_count"
          echo "----------------------------------------"
          
          # 输出到GitHub步骤摘要
          {
            echo "## 🧹 Cleanup Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total runs found | $total_runs |"
            echo "| Runs kept | $keep_runs |"
            echo "| Successfully deleted | $deleted_count |"
            echo "| Failed to delete | $failed_count |"
            echo ""
            echo "✅ Old workflow runs cleaned up successfully!"
          } >> $GITHUB_STEP_SUMMARY
